# MySQL Connection - Switched to Aiven Cloud
# Replace YOUR_REVEALED_PASSWORD with the one from your Aiven dashboard
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Server Port (Kept at 8081 for your frontend connectivity)
server.port=8080

# JPA/Hibernate Settings
# 'update' will automatically create your tables in the cloud on the first run
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Using the modern Dialect for Aiven's MySQL 8.0
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Maintains compatibility with your existing Java variable naming
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.jpa.open-in-view=false

# Increases the timeout to 30 seconds to account for the distance to Bangalore
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000