<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Willowton PMS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* FIX: Prevents main style.css from treating login like a dashboard page */
        body.login-page { 
            margin: 0 !important; 
            padding: 0 !important;
            display: flex !important; 
            justify-content: center !important; 
            align-items: center !important; 
            background: #0f172a; 
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
        }

        /* Ensure the box ignores any sidebar offsets */
        .login-box { 
            margin-left: 0 !important; 
            width: 100%;
            max-width: 400px; 
            padding: 2.5rem; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            z-index: 10;
        }

        label {
            display: block;
            margin-top: 15px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #1e293b;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            box-sizing: border-box; 
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 1rem;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-box">
        <h2 style="color: #0f172a; text-align: center; margin-bottom: 5px;">Willowton PMS</h2>
        <p style="text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 25px;">
            Access to manage procurement
        </p>

        <div id="login-error" style="display: none; color: #ef4444; background: #fee2e2; padding: 10px; border-radius: 6px; text-align: center; font-size: 0.85rem; margin-bottom: 15px; border: 1px solid #fecaca;">
            Invalid credentials. Please try again.
        </div>

        <form id="loginForm">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" required>
            
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            
            <button type="submit" id="loginBtn">Access System</button>
        </form>
        
        <p style="text-align: center; margin-top: 25px; font-size: 0.75rem; color: #94a3b8;">
            © 2026 Willowton Group • Procurement Management
        </p>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
