<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Access Control | Willowton PMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header"><h2>Willowton</h2></div>
        <ul class="nav-links">
            <li class="nav-item" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </li>
        </ul>
    </div>

    <main class="content-area">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div>
                <h1 style="color: var(--primary);">User & Access Control</h1>
                <p style="color: var(--text-muted);">Provision system access and manage corporate roles.</p>
            </div>
            <button class="btn-primary" onclick="openUserModal()">
                <i class="fas fa-user-plus"></i> PROVISION NEW USER
            </button>
        </header>

        <section class="card">
            <div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
                <h3 style="color: var(--primary);">Active Personnel</h3>
                <div class="search-box">
                    <i class="fas fa-search" style="margin-right: 8px; color: var(--text-muted);"></i>
                    <input type="text" id="userSearch" placeholder="Filter by name or username..." 
                           style="width: 250px; padding: 8px; border: 1px solid var(--border); border-radius: 6px;">
                </div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Full Name</th>
                        <th>Corporate ID</th>
                        <th>System Role</th>
                        <th>Department</th>
                        <th>Status</th>
                        <th style="text-align: right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <tr><td colspan="6" style="text-align:center; padding:30px;"><i class="fas fa-spinner fa-spin"></i> Initializing directory...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

   <div id="userModal" class="modal">
    <div class="modal-content" style="max-width: 500px;">
        <span class="close-btn" onclick="closeUserModal()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary);"><i class="fas fa-shield-alt"></i> New User Provisioning</h2>
        <p id="modalSubtext" style="margin-bottom: 20px; color: var(--text-muted); font-size: 0.9rem;">Assigning a role grants specific data permissions.</p>
        
        <form id="createUserForm">
            <input type="hidden" id="editUserId">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="newFullName" placeholder="e.g. John Phiri" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Corporate Username</label>
                    <input type="text" id="newUsername" placeholder="e.g. jphiri" required>
                </div>
                <div class="form-group">
                    <label id="passwordLabel">Initial Password</label>
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>System Role</label>
                    <select id="roleSelect" required></select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="deptSelect" required></select>
                </div>
            </div>

            <div class="modal-actions">
                <button type="button" class="btn-secondary" onclick="closeUserModal()">Cancel</button>
                <button type="submit" id="submitBtn" class="btn-primary-success">Create Account</button>
            </div>
        </form>
    </div>
</div>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/users.js"></script>
</body>
</html>
